<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Eternal Elements Mobile v7</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#1e293b; --panel-2:#111827; --border:#334155; --text:#e2e8f0; --muted:#94a3b8;
      --gold:#facc15; --btn:#334155; --btn2:#1f2937; --danger:#7f1d1d; --ok:#14532d;
      --fire-bg:#7f1d1d; --fire-tx:#fecaca; --water-bg:#1e3a8a; --water-tx:#bfdbfe; --earth-bg:#3f6212; --earth-tx:#d9f99d;
      --rank-bg:#581c87; --rank-tx:#f3e8ff;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    body{min-height:100vh;padding:12px 12px 12px 100px + env(safe-area-inset-bottom))}
    .app{max-width:760px;margin:0 auto}
    .title{text-align:center;font-size:clamp(24px,6vw,34px);font-weight:800;margin:8px 0 16px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 8px 20px rgba(0,0,0,.18)}
    .subpanel{background:var(--panel-2);border:1px solid var(--border);border-radius:14px;padding:12px;margin-top:10px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1 1 320px;min-width:0}
    button{background:var(--btn);color:#fff;border:none;border-radius:12px;padding:12px 14px;min-height:46px;font-weight:700;cursor:pointer;margin:6px 6px 0 0;font-size:14px}
    button:hover{filter:brightness(1.08)}
    button.secondary{background:var(--btn2)} button.danger{background:var(--danger)} button.success{background:var(--ok)} button.gold{background:#7c5a00}
    button.full{width:100%;margin-right:0}
    input,select{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#0b1220;color:#fff;margin-top:6px;margin-bottom:12px;font-size:16px;min-height:46px}
    p{margin:6px 0}.small{font-size:12px;color:var(--muted)}
    .stats-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}
    .stat{background:#0b1220;border:1px solid var(--border);border-radius:12px;padding:10px}
    .stat .label{font-size:12px;color:var(--muted)} .stat .value{font-size:18px;font-weight:800;margin-top:4px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700;margin-left:6px;vertical-align:middle}
    .fire{background:var(--fire-bg);color:var(--fire-tx)} .water{background:var(--water-bg);color:var(--water-tx)} .earth{background:var(--earth-bg);color:var(--earth-tx)}
    .rank{background:var(--rank-bg);color:var(--rank-tx)}
    .item,.map-card,.node-card,.rank-card,.skill-card,.recipe-card{padding:12px;border:1px solid var(--border);border-radius:14px;background:#0b1220;margin-bottom:10px}
    .map-card.current-map,.node-card.active-node,.rank-card.active-node{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
    .resource{display:inline-block;margin:4px 6px 0 0;padding:6px 10px;border-radius:999px;background:#0b1220;border:1px solid var(--border);font-size:13px}
    .slot-label{color:#93c5fd;font-weight:700;text-transform:capitalize}.empty{color:var(--muted);font-style:italic}
    .rarity-comum{color:#e2e8f0}.rarity-raro{color:#60a5fa}.rarity-epico{color:#c084fc}.rarity-lendario{color:#facc15;text-shadow:0 0 8px rgba(250,204,21,.18)}
    .highlight{color:var(--gold);font-weight:700}.good{color:#22c55e;font-weight:700}.bad{color:#ef4444;font-weight:700}.pill{display:inline-block;background:#0b1220;border:1px solid var(--border);border-radius:999px;padding:4px 8px;font-size:12px;margin-right:6px}
    .hero-line{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .log-box{max-height:260px;overflow:auto}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid-3{display:grid;grid-template-columns:1fr;gap:10px}
    .pixel-map{
      position:relative;
      border:3px solid #475569;
      border-radius:14px;
      padding:14px;
      min-height:360px;
      overflow:hidden;
      image-rendering: pixelated;
      background:#132033;
      box-shadow:0 10px 28px rgba(0,0,0,.25), inset 0 0 0 2px rgba(255,255,255,.03);
    }
    .pixel-map.floresta{
      background:
        radial-gradient(circle at 15% 20%, rgba(34,197,94,.18) 0 10%, transparent 11%),
        radial-gradient(circle at 72% 22%, rgba(34,197,94,.16) 0 8%, transparent 9%),
        radial-gradient(circle at 58% 72%, rgba(34,197,94,.18) 0 9%, transparent 10%),
        linear-gradient(180deg, #25452d 0%, #1a2f1f 55%, #15281b 100%);
    }
    .pixel-map.reino{
      background:
        linear-gradient(180deg, #364152 0%, #27303c 55%, #1b2230 100%);
    }
    .pixel-map.lago{
      background:
        radial-gradient(circle at 70% 25%, rgba(56,189,248,.20) 0 14%, transparent 15%),
        radial-gradient(circle at 24% 68%, rgba(56,189,248,.14) 0 10%, transparent 11%),
        linear-gradient(180deg, #143a53 0%, #102b3c 45%, #0d2230 100%);
    }
    .pixel-map-grid{
      position:absolute;inset:0;opacity:.15;
      background-image:
        linear-gradient(to right, #94a3b8 1px, transparent 1px),
        linear-gradient(to bottom, #94a3b8 1px, transparent 1px);
      background-size:16px 16px;
      pointer-events:none;
    }
    .pixel-decor{position:absolute;pointer-events:none;opacity:.95}
    .pixel-tree{width:18px;height:18px;background:#166534;border:2px solid #14532d;box-shadow:0 10px 0 -4px #3f3f46}
    .pixel-rock{width:16px;height:14px;background:#94a3b8;border:2px solid #64748b}
    .pixel-water{width:26px;height:18px;background:#0ea5e9;border:2px solid #0284c7}
    .pixel-castle{width:22px;height:20px;background:#cbd5e1;border:2px solid #94a3b8;box-shadow:8px 0 0 -2px #cbd5e1, -8px 0 0 -2px #cbd5e1}
    .pixel-path{
      animation: shimmer 3s infinite;
      position:absolute;
      height:10px;
      background:#b0895a;
      border:2px solid #7c5b3c;
      border-radius:0;
      box-shadow:0 0 0 2px rgba(0,0,0,.12) inset;
    }
    .pixel-node{
      position:absolute;
      width:108px;
      min-height:74px;
      padding:8px;
      background:#1e293b;
      border:3px solid #cbd5e1;
      border-radius:0;
      box-shadow:4px 4px 0 #0f172a;
      cursor:pointer;
      transition:transform .08s ease, box-shadow .12s ease;
      animation: nodeFloat 2.8s ease-in-out infinite;
    }
    .pixel-node:hover{transform:translate(-1px,-1px) scale(1.01)}
    .pixel-node.active{border-color:#facc15;box-shadow:0 0 0 2px #facc15, 4px 4px 0 #0f172a}
    .pixel-node.boss{
      border-color:#ef4444;
      background:#31111b;
      box-shadow:0 0 0 2px #ef4444, 4px 4px 0 #0f172a;
      animation: bossPulse 1.6s ease-in-out infinite;
    }
    .pixel-node .name{font-size:12px;font-weight:800;line-height:1.2}
    .pixel-node .type{font-size:10px;color:#cbd5e1;margin-top:4px}
    .pixel-node .badge-mini{
      display:inline-block;margin-top:5px;padding:2px 6px;font-size:10px;
      border:1px solid #475569;background:#0f172a
    }
    .pixel-node.boss .badge-mini{border-color:#ef4444}
    .pixel-node.locked{opacity:.72; filter:saturate(.7)}
    .pixel-boss-legend{
      display:inline-block;
      margin-right:8px;
      padding:4px 8px;
      border:1px solid #ef4444;
      background:#31111b;
      font-size:11px;
    }
    @keyframes bossPulse{
      0%,100%{transform:translateY(0); box-shadow:0 0 0 2px #ef4444, 4px 4px 0 #0f172a}
      50%{transform:translateY(-2px); box-shadow:0 0 0 3px #f87171, 4px 4px 0 #0f172a}
    }
    @keyframes nodeFloat{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-2px)}
    }
    @keyframes shimmer{
      0%{opacity:.35}
      50%{opacity:.8}
      100%{opacity:.35}
    }
    .nav{position:fixed;top:0;bottom:0;left:0;width:90px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(15,23,42,.96);backdrop-filter:blur(8px);border-top:1px solid var(--border);z-index:30}
    .nav-grid{display:flex;flex-direction:column;gap:8px;height:100%}
    .nav button{margin:0;min-height:52px;border-radius:14px;padding:8px;font-size:12px}
  </style>
</head>
<body>
  <div class="app">
    <div class="title">🔥 Eternal Elements 🌊</div>
    <div id="app"></div>
  </div>

  <button id="menuToggle" onclick="toggleMenu()" style="display:none; position:fixed; top:12px; left:12px; z-index:50; background:#1e293b; border:1px solid #475569; border-radius:12px; padding:10px 12px; font-weight:700;">☰ Menu</button>
  <div id="menuDrawer" style="display:none; position:fixed; top:56px; left:12px; z-index:49; width:220px; background:#0f172a; border:1px solid #475569; border-radius:14px; padding:10px; box-shadow:0 12px 28px rgba(0,0,0,.35);">

    <button class="full" onclick="goTab('save'); closeMenu();">Salvar</button>
  </div>

  <script>
    const ELEMENTS = ["Fogo","Água","Terra"];
    const EQUIPMENT_SLOTS = ["elmo","arma","luvas","armadura","calcas","sapatos"];
    const SAVE_KEY = "eternal_elements_mobile_v7";
    const SAVE_VERSION = 2;
    const MAPS = {
      Floresta:{description:"Monstros ligados à Terra aparecem com mais frequência. Materiais de Terra são mais abundantes.", favoredElement:"Terra", hpMultiplier:1.05, xpMultiplier:1.00, goldMultiplier:1.00, materialBonus:{Terra:1}, difficulty:"Baixa", recommendedLevel:"1+", boss:{name:"Ent Supremo", element:"Terra", unlockClears:5}},
      Reino:{description:"Área mais rica e disputada. Combates rendem mais ouro e inimigos costumam ser mais organizados.", favoredElement:"Fogo", hpMultiplier:1.10, xpMultiplier:1.00, goldMultiplier:1.20, materialBonus:{Fogo:1}, difficulty:"Média", recommendedLevel:"3+", boss:{name:"Guardião Carmesim", element:"Fogo", unlockClears:5}},
      Lago:{description:"Região tomada por criaturas de Água. Combates aqui rendem mais experiência e fluxo mágico.", favoredElement:"Água", hpMultiplier:1.00, xpMultiplier:1.15, goldMultiplier:1.00, materialBonus:{Água:1}, difficulty:"Média", recommendedLevel:"4+", boss:{name:"Serpente do Abismo", element:"Água", unlockClears:5}}
    };
    const MAP_NODES = {
      Floresta:[{id:"bosque_inicial",name:"Bosque Inicial",type:"combate",desc:"Área segura para primeiros confrontos."},{id:"clareira_mineral",name:"Clareira Mineral",type:"mineracao",desc:"Zona rica em fragmentos de Terra."},{id:"tronco_antigo",name:"Tronco Antigo",type:"evento",desc:"Local reservado para eventos futuros."}],
      Reino:[{id:"portao_real",name:"Portão Real",type:"combate",desc:"Entrada do Reino com guardiões agressivos."},{id:"forja_real",name:"Forja Real",type:"mineracao",desc:"Mineração de fragmentos ígneos e metais."},{id:"praca_central",name:"Praça Central",type:"evento",desc:"Reservado para quests e NPCs."}],
      Lago:[{id:"margem_serena",name:"Margem Serena",type:"combate",desc:"Criaturas aquáticas patrulham a margem."},{id:"caverna_umida",name:"Caverna Úmida",type:"mineracao",desc:"Fonte de essências aquáticas."},{id:"ilha_funda",name:"Ilha Funda",type:"evento",desc:"Espaço planejado para chefe secreto."}]
    };
    const SPELL_BOOK = [
      {id:"chama_vital",name:"Chama Vital",reqLevel:1,auraCost:2,manaCost:14,element:"Fogo",description:"Explosão elemental focada em dano.",type:"damage",power:1.9},
      {id:"onda_arcana",name:"Onda Arcana",reqLevel:1,auraCost:2,manaCost:14,element:"Água",description:"Ataque mágico preciso com alto dano.",type:"damage",power:2.0},
      {id:"pele_de_pedra",name:"Pele de Pedra",reqLevel:2,auraCost:3,manaCost:12,element:"Terra",description:"Aumenta a defesa do jogador durante a batalha.",type:"buff",defenseBuff:8},
      {id:"sifao_arcano",name:"Sifão Arcano",reqLevel:3,auraCost:4,manaCost:16,element:"Água",description:"Causa dano e recupera mana.",type:"drain",power:1.5,manaRestore:10},
      {id:"tempestade_ignea",name:"Tempestade Ígnea",reqLevel:4,auraCost:6,manaCost:24,element:"Fogo",description:"Magia avançada de dano em chamas.",type:"damage",power:2.8},
      {id:"maremoto_arcano",name:"Maremoto Arcano",reqLevel:5,auraCost:7,manaCost:26,element:"Água",description:"Rajada massiva de água com grande dano.",type:"damage",power:3.0},
      {id:"fortaleza_da_terra",name:"Fortaleza da Terra",reqLevel:6,auraCost:8,manaCost:20,element:"Terra",description:"Grande reforço defensivo durante a batalha.",type:"buff",defenseBuff:16}
    ];
    const POTION_SHOP = {
      heal: [
        {id:"heal_frasco", name:"Frasco de Cura", price:20, amount:1, heal:40},
        {id:"heal_calice", name:"Cálice de Cura", price:45, amount:1, heal:85},
        {id:"heal_garrafa", name:"Garrafa de Cura", price:80, amount:1, heal:150}
      ],
      mana: [
        {id:"mana_frasco", name:"Frasco de Mana", price:25, amount:1, mana:30},
        {id:"mana_calice", name:"Cálice de Mana", price:55, amount:1, mana:70},
        {id:"mana_garrafa", name:"Garrafa de Mana", price:95, amount:1, mana:130}
      ]
    };
    const COMPANIONS = [
      {id:"lobo_rubro", name:"Lobo Rubro", element:"Fogo", price:180, bonusType:"attack", bonus:4, skill:"Mordida Flamejante"},
      {id:"coruja_mistica", name:"Coruja Mística", element:"Água", price:210, bonusType:"mana", bonus:20, skill:"Névoa Restauradora"},
      {id:"urso_terreo", name:"Urso Térreo", element:"Terra", price:240, bonusType:"defense", bonus:5, skill:"Pele Rochosa"}
    ];
    const CRAFT_RECIPES = [
      {id:"arma_fogo",name:"Arma Flamejante Forjada",slot:"arma",element:"Fogo",material:"Fogo",cost:5,statType:"attack",bonus:7,rarity:"Raro"},
      {id:"armadura_terra",name:"Armadura do Vale Forjada",slot:"armadura",element:"Terra",material:"Terra",cost:5,statType:"defense",bonus:7,rarity:"Raro"},
      {id:"elmo_agua",name:"Elmo das Marés Forjado",slot:"elmo",element:"Água",material:"Água",cost:5,statType:"defense",bonus:6,rarity:"Raro"}
    ];
    const BATTLE_RANKS = {
      random:{label:"Aleatório",multiplier:null,bonusLoot:0,minLevel:1},
      Lacaio:{label:"Lacaio",multiplier:1,bonusLoot:0,minLevel:1},
      Comandante:{label:"Comandante",multiplier:1.4,bonusLoot:1,minLevel:3},
      General:{label:"General",multiplier:1.9,bonusLoot:2,minLevel:5},
      Boss:{label:"Boss",multiplier:2.8,bonusLoot:4,minLevel:1}
    };

    let player = null, enemy = null, battleActive = false, battleLog = [], currentScreen = "casa", selectedBattleRank = "random";
    function toggleMenu(){
      const d = document.getElementById("menuDrawer");
      if(!d) return;
      d.style.display = d.style.display === "none" || !d.style.display ? "block" : "none";
    }
    function closeMenu(){
      const d = document.getElementById("menuDrawer");
      if(d) d.style.display = "none";
    }

    function getElementClass(element){ if(element==="Fogo") return "fire"; if(element==="Água") return "water"; return "earth"; }
    function getRarityClass(r){ if(r==="Raro") return "rarity-raro"; if(r==="Épico") return "rarity-epico"; if(r==="Lendário" || r==="Mítico") return "rarity-lendario"; return "rarity-comum"; }
    function companionAction(){
      if(!player || !player.companion || !battleActive || !enemy) return false;
      const roll = Math.random();
      if(player.companion.id === "lobo_rubro" && roll < 0.35){
        const dmg = 8 + player.level + Math.floor((player.companion.bonus||0)/2);
        enemy.hp -= dmg;
        addLog(`${player.companion.name} usou ${player.companion.skill} e causou ${dmg} de dano.`);
        return true;
      }
      if(player.companion.id === "coruja_mistica" && roll < 0.30){
        const mana = 12 + Math.floor(player.level/2);
        player.mana = Math.min(getEffectiveMaxMana(), player.mana + mana);
        addLog(`${player.companion.name} usou ${player.companion.skill} e restaurou ${mana} de mana.`);
        return true;
      }
      if(player.companion.id === "urso_terreo" && roll < 0.28){
        player.temporaryDefenseBonus += 4;
        addLog(`${player.companion.name} usou ${player.companion.skill} e reforçou sua defesa.`);
        return true;
      }
      return false;
    }
    function formatSlotName(slot){ return {elmo:"Elmo",arma:"Arma",luvas:"Luvas",armadura:"Armadura",calcas:"Calças",sapatos:"Sapatos"}[slot] || slot; }
    function getClassData(cls){ return {guerreiro:{name:"Guerreiro",maxHp:140,attack:16,defense:10,maxMana:20},arqueiro:{name:"Arqueiro",maxHp:110,attack:20,defense:7,maxMana:30},mago:{name:"Mago",maxHp:85,attack:24,defense:4,maxMana:60}}[cls]; }
    function ensurePlayerState(){
      if(!player) return;
      if(!player.healPotions) player.healPotions = {frasco: player.potions || 0, calice: 0, garrafa: 0};
      if(!player.manaPotionStock) player.manaPotionStock = {frasco: player.manaPotions || 0, calice: 0, garrafa: 0};
      if(typeof player.potions !== "number") player.potions = player.healPotions.frasco || 0;
      if(typeof player.manaPotions !== "number") player.manaPotions = player.manaPotionStock.frasco || 0;
      if(!player.innUniqueQuests){
        player.innUniqueQuests = [
          {id:"inn1", title:"Entrega da Estalagem", desc:"Venda 3 itens para os hóspedes da estalagem.", progress:0, target:3, rewardGold:90, rewardAura:1, claimed:false},
          {id:"inn2", title:"Colecionador Noturno", desc:"Mine 6 recursos e retorne à estalagem.", progress:0, target:6, rewardGold:70, rewardAura:1, claimed:false}
        ];
      }
      if(!player.quests){
        player.quests = [
          {id:"q1",type:"global",desc:"Derrote 5 inimigos",progress:0,target:5,rewardGold:50,rewardAura:0,done:false},
          {id:"q2",type:"global",desc:"Mine 10 recursos",progress:0,target:10,rewardGold:40,rewardAura:0,done:false},
          {id:"q3",type:"global",desc:"Forje 2 itens",progress:0,target:2,rewardGold:60,rewardAura:1,done:false},
          {id:"map_floresta",type:"map",map:"Floresta",desc:"Derrote 3 inimigos na Floresta",progress:0,target:3,rewardGold:55,rewardAura:1,done:false},
          {id:"map_reino",type:"map",map:"Reino",desc:"Derrote 3 inimigos no Reino",progress:0,target:3,rewardGold:70,rewardAura:1,done:false},
          {id:"map_lago",type:"map",map:"Lago",desc:"Derrote 3 inimigos no Lago",progress:0,target:3,rewardGold:70,rewardAura:1,done:false},
          {id:"boss_floresta",type:"boss",map:"Floresta",desc:"Derrote o boss da Floresta",progress:0,target:1,rewardGold:120,rewardAura:2,done:false},
          {id:"boss_reino",type:"boss",map:"Reino",desc:"Derrote o boss do Reino",progress:0,target:1,rewardGold:150,rewardAura:2,done:false},
          {id:"boss_lago",type:"boss",map:"Lago",desc:"Derrote o boss do Lago",progress:0,target:1,rewardGold:150,rewardAura:2,done:false}
        ];
      }
      if(!player.economy){
        player.economy = {goldEarned:0,goldSpent:0,itemsSold:0,itemsCrafted:0,itemsRefined:0,battlesWon:0,battlesLost:0,miningYield:0};
      }
      if(!player.worldProgress){
        player.worldProgress = {
          Floresta:{clears:0,bossUnlocked:false,bossDefeated:false,mines:0},
          Reino:{clears:0,bossUnlocked:false,bossDefeated:false,mines:0},
          Lago:{clears:0,bossUnlocked:false,bossDefeated:false,mines:0}
        };
      }
      ["Floresta","Reino","Lago"].forEach(map=>{
        if(!player.worldProgress[map]) player.worldProgress[map] = {clears:0,bossUnlocked:false,bossDefeated:false,mines:0};
      });
      if(!player.equipment) player.equipment = {elmo:null,arma:null,luvas:null,armadura:null,calcas:null,sapatos:null};
      if(!player.materials) player.materials = {Fogo:0,Água:0,Terra:0};
      if(!player.inventory) player.inventory = [];
      if(!player.learnedSpells) player.learnedSpells = [];
      if(!player.currentMap) player.currentMap = "Floresta";
      if(player.eventChoice === undefined) player.eventChoice = null;
      if(!player.attributes) player.attributes = {forca:0,resistencia:0,inteligencia:0,points:0};
      if(typeof player.attributes.points !== 'number') player.attributes.points = 0;
      if(!player.attributes) player.attributes = {forca:0,resistencia:0,inteligencia:0,points:0};

    function ensureEconomy(){
      if(!player.economy){
        player.economy = {goldEarned:0,goldSpent:0,itemsSold:0,itemsCrafted:0,itemsRefined:0,battlesWon:0,battlesLost:0,miningYield:0};
      }

    function getCraftPreviewSellValue(recipe){
      if(!player) return recipe.bonus * 5;
      const valueBonus = recipe.bonus + Math.floor(player.level/2);
      return valueBonus * 5;
    }
    function getNetGold(){
      ensureEconomy();
      return player.economy.goldEarned - player.economy.goldSpent;
    }
    function getItemComparisonText(item){
      const equipped = player.equipment[item.slot];
      if(!equipped){
        return '<span class="good">Sem item equipado neste slot • ganho direto</span>';
      }
      const diff = item.bonus - equipped.bonus;
      if(diff > 0) return `<span class="good">Melhora de +${diff} no slot ${formatSlotName(item.slot)}</span>`;
      if(diff < 0) return `<span class="bad">Piora de ${diff} no slot ${formatSlotName(item.slot)}</span>`;
      return `Mesmo poder do item equipado em ${formatSlotName(item.slot)}`;
    }
    function getCraftComparisonText(recipe){
      if(!player) return '';
      const previewBonus = recipe.bonus + Math.floor(player.level/2);
      const equipped = player.equipment[recipe.slot];
      if(!equipped){
        return '<span class="good">Sem item equipado neste slot • craft entra forte</span>';
      }
      const diff = previewBonus - equipped.bonus;
      if(diff > 0) return `<span class="good">Se forjado agora: melhora de +${diff} no slot ${formatSlotName(recipe.slot)}</span>`;
      if(diff < 0) return `<span class="bad">Se forjado agora: piora de ${diff} no slot ${formatSlotName(recipe.slot)}</span>`;
      return `Se forjado agora: mesmo poder do item equipado em ${formatSlotName(recipe.slot)}`;
    }
    function getCraftPreviewSellValue(recipe){
      if(!player) return recipe.bonus * 5;
      const valueBonus = recipe.bonus + Math.floor(player.level/2);
      return valueBonus * 5;
    }

    function cancelEvent(){
      player.eventChoice = null;
      currentScreen = "world";

      render();
    }

    function resolveEventChoice(index){
      const ev = player.eventChoice;
      if(!ev || !ev.choices[index]) return;
      const effect = ev.choices[index].effect;
      if(effect === "heal_help"){
        player.hp = Math.min(player.maxHp, player.hp + 35);
        player.aura += 1;
        addLog("Você ajudou o viajante, recuperou vida e ganhou 1 aura.");
      } else if(effect === "gold_help"){
        player.gold += 35;
        ensureEconomy();
        player.economy.goldEarned += 35;
        addLog("Você cobrou pelo socorro e recebeu 35 ouro.");
      } else if(effect === "safe_chest"){
        player.gold += 25;
        player.homeCraftStock.healEssence += 1;
        ensureEconomy();
        player.economy.goldEarned += 25;
        addLog("Você abriu o baú com cuidado e encontrou ouro e essência de cura.");
      } else if(effect === "risky_chest"){
        const roll = Math.random();
        if(roll < 0.5){
          const drop = tryDropItem({rank:"General", element:MAPS[player.currentMap].favoredElement});
          if(drop){
            player.inventory.push(drop);
            addLog(`O baú continha um item: ${drop.name}.`);
          } else {
            player.gold += 45;
            ensureEconomy();
            player.economy.goldEarned += 45;
            addLog("Você forçou o baú e achou 45 ouro.");
          }
        } else {
          player.hp = Math.max(1, player.hp - 20);
          addLog("Armadilha! Você perdeu 20 HP ao forçar o baú.");
        }
      } else if(effect === "mana_fountain"){
        player.mana = Math.min(getEffectiveMaxMana(), player.mana + 60);
        addLog("A fonte restaurou 60 de mana.");
      } else if(effect === "essence_fountain"){
        player.homeCraftStock.manaEssence += 2;
        player.homeCraftStock.healEssence += 1;
        addLog("Você coletou essências mágicas na fonte.");
      } else {
        addLog("Você decidiu seguir viagem sem interagir.");
      }

      player.eventChoice = null;
      currentScreen = "world";
      saveGame();
      render();
    }

    function spendAttribute(attr){
      if(player.attributes.points <= 0) return;
      player.attributes.points -= 1;
      player.attributes[attr] += 1;
      if(attr === 'forca') player.attack += 2;
      if(attr === 'resistencia'){ player.defense += 1; player.maxHp += 8; player.hp = Math.min(player.maxHp, player.hp + 8); }
      if(attr === 'inteligencia'){ player.maxMana += 8; player.mana = Math.min(getEffectiveMaxMana(), player.mana + 8); }
      addLog(`Você investiu 1 ponto em ${attr}.`);
      saveGame(); render();
    }

    function craftHomePotion(kind){
      if(kind === 'heal'){
        if(player.homeCraftStock.healEssence < 3) return;
        player.homeCraftStock.healEssence -= 3;
        player.healPotions.frasco += 1;
        player.potions += 1;
        addLog("Você criou 1 Frasco de Cura na Casa.");
      } else {
        if(player.homeCraftStock.manaEssence < 3) return;
        player.homeCraftStock.manaEssence -= 3;
        player.manaPotionStock.frasco += 1;

    function innTradeMaterials(){
      const mat = MAPS[player.currentMap].favoredElement;
      if(player.materials[mat] < 3){
        addLog("Materiais insuficientes para a troca da estalagem.");
        return render();
      }
      player.materials[mat] -= 3;
      player.gold += 35;
      ensureEconomy();
      player.economy.goldEarned += 35;
      addLog(`Você trocou 3 materiais de ${mat} por 35 ouro na estalagem.`);
      updateInnQuest('trade');
      saveGame();
      render();
    }

    function claimInnQuest(index){
      const q = player.innUniqueQuests[index];
      if(!q || !q.done || q.claimed) return;
      player.gold += q.rewardGold;
      player.aura += q.rewardAura;
      ensureEconomy();
      player.economy.goldEarned += q.rewardGold;
      q.claimed = true;
      addLog(`Quest única concluída: ${q.title}.`);
      saveGame();
      render();
    }

    function buyCompanion(id){
      const c = COMPANIONS.find(x => x.id === id);
      if(!c) return;
      if(player.gold < c.price){
        addLog("Ouro insuficiente para adquirir este companheiro.");
        return render();
      }
      player.gold -= c.price;
      ensureEconomy();
      player.economy.goldSpent += c.price;
      player.companion = {...c};
      addLog(`${player.name} adquiriu o companheiro ${c.name}.`);
      saveGame();
      render();
    }

    function updateInnQuest(type){
      if(!player.innUniqueQuests) return;
      player.innUniqueQuests.forEach(q => {
        if(q.claimed) return;
        if(type === 'trade' && q.id === 'inn1') q.progress++;
        if(type === 'mine' && q.id === 'inn2') q.progress++;
        if(q.progress >= q.target) q.done = true;
      });
    }

    function weightedElement(favored){ const roll = Math.random(); if(roll < 0.5) return favored; const others = ELEMENTS.filter(el => el !== favored); return others[Math.floor(Math.random() * others.length)]; }

    function getEnemyScalingFactor(rank){
      const baseLevelScale = 1 + (player.level - 1) * 0.12;
      const mapProgressScale = 1 + (player.worldProgress[player.currentMap].clears * 0.015);
      const refinePressure = 1 + (getTotalRefineLevels() * 0.01);
      const companionPressure = player.companion ? 1.08 : 1;
      const rankPressure = rank === "Boss" ? 1.15 : rank === "General" ? 1.08 : rank === "Comandante" ? 1.04 : 1;
      return baseLevelScale * mapProgressScale * refinePressure * companionPressure * rankPressure;
    }

    function getTotalRefineLevels(){
      let total = 0;
      if(player.inventory){
        player.inventory.forEach(item => total += (item.refineLevel || 0));
      }
      if(player.equipment){
        Object.values(player.equipment).forEach(item => { if(item) total += (item.refineLevel || 0); });
      }
      return total;
    }

    function generateEnemy(){
      const mapData = MAPS[player.currentMap];
      let rank = selectedBattleRank;
      if(rank === "random"){
        const roll = Math.random();
        rank = "Lacaio";
        if(player.level >= 3 && roll > 0.55) rank = "Comandante";
        if(player.level >= 5 && roll > 0.80) rank = "General";
      }

      const scale = getEnemyScalingFactor(rank);

      if(rank === "Boss"){
        const bossCfg = MAPS[player.currentMap].boss;
        const hp = Math.floor((95 + player.level * 18) * 2.8 * mapData.hpMultiplier * scale);
        return {
          name:bossCfg.name,
          rank:"Boss",
          element:bossCfg.element,
          hp,
          maxHp:hp,
          attack:Math.floor((18 + player.level * 4) * 2.3 * scale),
          defense:Math.floor((10 + player.level * 2.5) * 2.1 * scale),
          xpReward:Math.floor((90 + player.level * 24) * mapData.xpMultiplier * (1 + scale * 0.15)),
          goldReward:Math.floor((55 + player.level * 10) * mapData.goldMultiplier * (1 + scale * 0.10))
        };
      }

      const element = weightedElement(mapData.favoredElement);
      const rankMultiplier = BATTLE_RANKS[rank].multiplier;
      const names = {
        Floresta:{Fogo:["Raposa Rubra","Treant em Chamas","Fera da Casca Ardente"], Água:["Ninfa Orvalhada","Lodo das Raízes","Serpente da Névoa"], Terra:["Ent Ancião","Javali de Pedra","Besouro de Musgo"]},
        Reino:{Fogo:["Cavaleiro Carmesim","Sentinela da Brasa","Golem Incandescente"], Água:["Guarda da Maré","Arauto do Canal","Espadachim Nebuloso"], Terra:["Guardião do Portão","Troll Rochoso","Carcereiro de Granito"]},
        Lago:{Fogo:["Lagarto Escaldante","Fênix Jovem","Lobo da Bruma Quente"], Água:["Serpente Marinha","Slime Azul","Guardião da Maré"], Terra:["Tartaruga de Pedra","Caranguejo Rochoso","Monólito Errante"]}
      };
      const name = names[player.currentMap][element][Math.floor(Math.random() * names[player.currentMap][element].length)];
      const hp = Math.floor((45 + player.level * 12) * rankMultiplier * mapData.hpMultiplier * scale);
      return {
        name,
        rank,
        element,
        hp,
        maxHp:hp,
        attack:Math.floor((10 + player.level * 3) * rankMultiplier * scale),
        defense:Math.floor((4 + player.level * 2) * rankMultiplier * scale),
        xpReward:Math.floor((35 + player.level * 12) * rankMultiplier * mapData.xpMultiplier * (1 + scale * 0.12)),
        goldReward:Math.floor((12 + player.level * 6) * rankMultiplier * mapData.goldMultiplier * (1 + scale * 0.08))
      };
    }

    function renderBattle(){
      document.getElementById("app").innerHTML = `
        <div class="panel">
          <div class="hero-line">
            <div><strong>${player.name}</strong> • ${player.className} • ${player.currentMap}</div>

          <div class="stats-grid">
            <div class="stat"><div class="label">HP</div><div class="value">${player.hp}/${player.maxHp}</div></div>
            <div class="stat"><div class="label">Mana</div><div class="value">${player.mana}/${getEffectiveMaxMana()}</div></div>
            <div class="stat"><div class="label">Ataque total</div><div class="value">${getPlayerAttackValue()}</div></div>
            <div class="stat"><div class="label">Defesa total</div><div class="value">${getPlayerDefenseValue()}</div></div>
            <div class="stat"><div class="label">Cura</div><div class="value">F:${player.healPotions.frasco} C:${player.healPotions.calice} G:${player.healPotions.garrafa}</div></div>
            <div class="stat"><div class="label">Mana</div><div class="value">F:${player.manaPotionStock.frasco} C:${player.manaPotionStock.calice} G:${player.manaPotionStock.garrafa}</div></div>

            <p class="small">${elementHint(enemy.element)}</p>

          </div>
          <div class="subpanel">
            <p class="small">Usar poção também consome o turno.</p>
            <button onclick="playerAttack()">Atacar</button>
            <button onclick="useSkill()">Habilidade</button>
            ${renderBattleConsumables()}

    }


    function renderHomeConsumables(){
      let buttons = "";
      if((player.healPotions?.frasco || 0) > 0) buttons += `<button onclick="usePotion('frasco')">Usar Cura F (${player.healPotions.frasco})</button>`;
      if((player.healPotions?.calice || 0) > 0) buttons += `<button onclick="usePotion('calice')">Usar Cura C (${player.healPotions.calice})</button>`;
      if((player.healPotions?.garrafa || 0) > 0) buttons += `<button onclick="usePotion('garrafa')">Usar Cura G (${player.healPotions.garrafa})</button>`;
      if((player.manaPotionStock?.frasco || 0) > 0) buttons += `<button onclick="useManaPotion('frasco')">Usar Mana F (${player.manaPotionStock.frasco})</button>`;
      if((player.manaPotionStock?.calice || 0) > 0) buttons += `<button onclick="useManaPotion('calice')">Usar Mana C (${player.manaPotionStock.calice})</button>`;
      if((player.manaPotionStock?.garrafa || 0) > 0) buttons += `<button onclick="useManaPotion('garrafa')">Usar Mana G (${player.manaPotionStock.garrafa})</button>`;

    function renderBattleConsumables(){
      let buttons = "";
      if((player.healPotions?.frasco || 0) > 0) buttons += `<button onclick="usePotion('frasco')">Cura F (${player.healPotions.frasco})</button>`;
      if((player.healPotions?.calice || 0) > 0) buttons += `<button onclick="usePotion('calice')">Cura C (${player.healPotions.calice})</button>`;
      if((player.healPotions?.garrafa || 0) > 0) buttons += `<button onclick="usePotion('garrafa')">Cura G (${player.healPotions.garrafa})</button>`;
      if((player.manaPotionStock?.frasco || 0) > 0) buttons += `<button onclick="useManaPotion('frasco')">Mana F (${player.manaPotionStock.frasco})</button>`;
      if((player.manaPotionStock?.calice || 0) > 0) buttons += `<button onclick="useManaPotion('calice')">Mana C (${player.manaPotionStock.calice})</button>`;
      if((player.manaPotionStock?.garrafa || 0) > 0) buttons += `<button onclick="useManaPotion('garrafa')">Mana G (${player.manaPotionStock.garrafa})</button>`;
      return buttons || `<p class="small">Sem consumíveis disponíveis.</p>`;
    }

    function renderBattleSpells(){
      if(!player.learnedSpells.length) return `<p class="small">Aprenda magias com o Ancião para usar em batalha.</p>`;
      return player.learnedSpells.map(id => {
        const spell = SPELL_BOOK.find(s => s.id === id);
        if(!spell) return "";
        return `<button onclick="castSpell('${id}')" ${player.mana < spell.manaCost ? "disabled" : ""}>${spell.name} (${spell.manaCost})</button>`;
      }).join("") || `<p class="small">Sem magias disponíveis.</p>`;
    }

    function elementHint(e){ if(e==="Fogo") return "Fraqueza: Água"; if(e==="Água") return "Fraqueza: Terra"; return "Fraqueza: Fogo"; }
    function getElementalMultiplier(a,t){
      if((a==="Fogo"&&t==="Terra")||(a==="Terra"&&t==="Água")||(a==="Água"&&t==="Fogo")) return 1.25;
      if((a==="Terra"&&t==="Fogo")||(a==="Água"&&t==="Terra")||(a==="Fogo"&&t==="Água")) return 0.8;
      return 1;
    }
    function getEquipmentBonus(type){ return EQUIPMENT_SLOTS.reduce((tot,slot)=>{const item = player.equipment[slot]; if(item && item.statType===type) tot += item.bonus; return tot;},0); }
    function getPlayerAttackValue(){
      let bonus = player.attack + getEquipmentBonus("attack");
      if(player.companion && player.companion.bonusType === "attack") bonus += player.companion.bonus;
      return bonus;
    }
    function getEffectiveMaxMana(){
      let total = player.maxMana;
      if(player.companion && player.companion.bonusType === "mana") total += player.companion.bonus;
      return total;
    }
    function getPlayerDefenseValue(){
      let bonus = player.defense + getEquipmentBonus("defense") + player.temporaryDefenseBonus;
      if(player.companion && player.companion.bonusType === "defense") bonus += player.companion.bonus;
      return bonus;
    }
    function applySpellElement(dmg, element){
      const mult = getElementalMultiplier(element, enemy.element);
      const finalD = Math.max(1, Math.floor(dmg * mult));
      if(mult > 1) addLog("A magia acertou uma fraqueza elemental.");
      if(mult < 1) addLog("A magia sofreu resistência elemental.");
      return finalD;
    }

    function playerAttack(){
      let dmg = Math.max(1, getPlayerAttackValue() - enemy.defense);
      if(player.equipment.arma){
        const mult = getElementalMultiplier(player.equipment.arma.element, enemy.element);
        dmg = Math.max(1, Math.floor(dmg * mult));
        if(mult > 1) addLog("Vantagem elemental! Seu ataque foi fortalecido.");
        if(mult < 1) addLog("Desvantagem elemental! Seu ataque perdeu força.");
      }
      enemy.hp -= dmg;
      addLog(`${player.name} causou ${dmg} de dano em ${enemy.name}.`);
      if(enemy.hp <= 0) return winBattle();
      companionAction();
      if(enemy.hp <= 0) return winBattle();
      companionAction();
      if(enemy.hp <= 0) return winBattle();
      companionAction();
      if(enemy.hp <= 0) return winBattle();
      companionAction();
      if(enemy.hp <= 0) return winBattle();
      saveGame(); enemyTurn();
    }

    function useSkill(){
      let manaCost=0,dmg=0,name="";
      if(player.classKey==="guerreiro"){ manaCost=6; dmg=Math.max(1,Math.floor((getPlayerAttackValue()*1.6)-enemy.defense)); name="Golpe Pesado";}
      else if(player.classKey==="arqueiro"){ manaCost=8; dmg=Math.max(1,Math.floor((getPlayerAttackValue()*1.7)-enemy.defense)); name="Flecha Precisa";}
      else { manaCost=12; dmg=Math.max(1,Math.floor((getPlayerAttackValue()*2.0)-enemy.defense)); name="Explosão Arcana";}
      if(player.mana < manaCost){ addLog("Mana insuficiente."); return render(); }
      if(player.equipment.arma){
        const mult = getElementalMultiplier(player.equipment.arma.element, enemy.element);
        dmg = Math.max(1, Math.floor(dmg * mult));
        if(mult > 1) addLog("Sua arma elemental ampliou a habilidade.");
        if(mult < 1) addLog("A afinidade elemental reduziu a força da habilidade.");
      }
      player.mana -= manaCost;
      enemy.hp -= dmg;
      addLog(`${player.name} usou ${name} e causou ${dmg} de dano.`);
      if(enemy.hp <= 0) return winBattle();
      companionAction();
      if(enemy.hp <= 0) return winBattle();
      saveGame(); enemyTurn();
    }

    function castSpell(id){
      const spell = SPELL_BOOK.find(s => s.id===id);
      if(!spell || !player.learnedSpells.includes(id)) return;
      if(player.mana < spell.manaCost){ addLog(`Mana insuficiente para usar ${spell.name}.`); return render(); }
      player.mana -= spell.manaCost;
      if(spell.type==="damage"){
        let dmg=Math.max(1,Math.floor((getPlayerAttackValue()*(spell.power + (player.level * 0.08)))-enemy.defense));
        dmg=applySpellElement(dmg, spell.element);
        enemy.hp -= dmg;
        addLog(`${player.name} conjurou ${spell.name} e causou ${dmg} de dano.`);
      }
      if(spell.type==="buff"){
        player.temporaryDefenseBonus += spell.defenseBuff;
        addLog(`${player.name} conjurou ${spell.name} e ganhou +${spell.defenseBuff} de defesa temporária.`);
      }
      if(spell.type==="drain"){
        let dmg=Math.max(1,Math.floor((getPlayerAttackValue()*(spell.power + (player.level * 0.08)))-enemy.defense));
        dmg=applySpellElement(dmg, spell.element);
        enemy.hp -= dmg;
        player.mana = Math.min(getEffectiveMaxMana(), player.mana + spell.manaRestore);
        addLog(`${player.name} usou ${spell.name}, causou ${dmg} de dano e recuperou ${spell.manaRestore} de mana.`);
      }
      if(enemy.hp <= 0) return winBattle();
      companionAction();
      if(enemy.hp <= 0) return winBattle();
      saveGame(); enemyTurn();
    }

    function usePotion(tier='frasco'){
      const heals = {frasco:40, calice:85, garrafa:150};
      if((player.healPotions[tier] || 0) <= 0){
        addLog("Você não possui esse tipo de poção de cura.");
        return render();
      }
      player.healPotions[tier] -= 1;
      if(tier === 'frasco' && player.potions > 0) player.potions -= 1;
      player.hp = Math.min(player.maxHp, player.hp + heals[tier]);
      addLog(`${player.name} usou ${tier === 'frasco' ? 'Frasco' : tier === 'calice' ? 'Cálice' : 'Garrafa'} de Cura e recuperou ${heals[tier]} HP.`);
      companionAction();
      if(battleActive && enemy && enemy.hp <= 0) return winBattle();
      companionAction();
      if(battleActive && enemy && enemy.hp <= 0) return winBattle();
      saveGame();
      if(battleActive){ enemyTurn(); } else { addLog('Você se recuperou na Casa usando um consumível.'); render(); }
    }

    function useManaPotion(tier='frasco'){
      const manas = {frasco:30, calice:70, garrafa:130};
      if((player.manaPotionStock[tier] || 0) <= 0){
        addLog("Você não possui esse tipo de poção de mana.");
        return render();
      }
      player.manaPotionStock[tier] -= 1;
      if(tier === 'frasco' && player.manaPotions > 0) player.manaPotions -= 1;
      player.mana = Math.min(getEffectiveMaxMana(), player.mana + manas[tier]);
      addLog(`${player.name} usou ${tier === 'frasco' ? 'Frasco' : tier === 'calice' ? 'Cálice' : 'Garrafa'} de Mana e recuperou ${manas[tier]} de mana.`);
      saveGame();
      if(battleActive){ enemyTurn(); } else { addLog('Você restaurou mana na Casa usando um consumível.'); render(); }
    }

    function enemyTurn(){
      const dmg = Math.max(1, enemy.attack - getPlayerDefenseValue());
      player.hp -= dmg;
      addLog(`${enemy.name} atacou e causou ${dmg} de dano.`);
      if(player.hp <= 0){
        player.hp = 0;
        addLog(`${player.name} foi derrotado.`);
        alert("Você foi derrotado. Seu HP e mana foram restaurados, mas perdeu 10 ouro.");
        player.gold = Math.max(0, player.gold - 10);
        ensureEconomy();
        player.economy.goldSpent += 10;
        player.economy.battlesLost += 1;
        player.hp = player.maxHp; player.mana = getEffectiveMaxMana(); player.temporaryDefenseBonus = 0;
        battleActive = false; enemy = null; currentScreen = "casa";
      }
      saveGame(); render();
    }

    function runAway(){
      addLog(`${player.name} fugiu da batalha.`);
      player.temporaryDefenseBonus = 0; battleActive = false; enemy = null; currentScreen = "casa";
      saveGame(); render();
    }

    function winBattle(){
      addLog(`Você derrotou ${enemy.name}!`);
      player.xp += enemy.xpReward;
      player.gold += enemy.goldReward;
      ensureEconomy();
      player.economy.goldEarned += enemy.goldReward;
      player.economy.battlesWon += 1;
      player.worldProgress[player.currentMap].clears += 1;
      updateQuest('battle', {map: player.currentMap});
      const bossCfg = MAPS[player.currentMap].boss;
      if(!player.worldProgress[player.currentMap].bossUnlocked && player.worldProgress[player.currentMap].clears >= bossCfg.unlockClears){
        player.worldProgress[player.currentMap].bossUnlocked = true;
        addLog(`O boss ${bossCfg.name} foi desbloqueado em ${player.currentMap}!`);
      }
      if(enemy.rank === "Boss"){
        // boss special mechanics
        if(enemy.hp < enemy.maxHp/2 && !enemy.enraged){
          enemy.attack = Math.floor(enemy.attack * 1.5);
          enemy.defense = Math.floor(enemy.defense * 1.2);
          enemy.enraged = true;
          addLog("Boss entrou em FÚRIA! Ataque e defesa aumentados.");
        }
        if(enemy.hp < enemy.maxHp*0.25 && !enemy.lastStand){
          enemy.hp += Math.floor(enemy.maxHp * 0.15);
          enemy.lastStand = true;
          addLog("Boss ativou ÚLTIMA RESISTÊNCIA e recuperou parte da vida!");
        } player.worldProgress[player.currentMap].bossDefeated = true; addLog(`Boss regional derrotado: ${enemy.name}.`); }
      addLog(`Recebeu ${enemy.xpReward} XP e ${enemy.goldReward} ouro.`);
      const mapBonus = MAPS[player.currentMap].materialBonus[enemy.element] || 0;
      const rankBonus = BATTLE_RANKS[enemy.rank] ? BATTLE_RANKS[enemy.rank].bonusLoot : 0;
      const materialQtyCasa = enemy.rank === "Boss" ? 3 : enemy.rank === "General" ? 2 : 1;
      const materialQty = materialQtyCasa + mapBonus + rankBonus;
      player.materials[enemy.element] += materialQty;
      addLog(`Dropou ${materialQty} material(is) de ${enemy.element}.`);
      const itemDrop = tryDropItem(enemy);
      if(itemDrop){ player.inventory.push(itemDrop); addLog(`Item dropado: ${itemDrop.name}.`); } else addLog("Nenhum equipamento dropado desta vez.");

      const miscRoll = Math.random();
      if(miscRoll < 0.18){
        player.healPotions.frasco += 1;
        player.potions += 1;
        addLog("Monstro dropou 1 Frasco de Cura.");
      } else if(miscRoll < 0.32){
        player.manaPotionStock.frasco += 1;
        player.manaPotions += 1;
        addLog("Monstro dropou 1 Frasco de Mana.");
      } else if(miscRoll < 0.48){
        player.homeCraftStock.healEssence += 1;
        addLog("Monstro dropou 1 Essência de Cura.");
      } else if(miscRoll < 0.64){
        player.homeCraftStock.manaEssence += 1;
        addLog("Monstro dropou 1 Essência de Mana.");
      }
      handleLevelUp();
      player.temporaryDefenseBonus = 0;
      player.hp = Math.max(1, Math.min(player.maxHp, player.hp));
      battleActive = false; enemy = null; currentScreen = "casa";
      saveGame(); render();
    }

    function handleLevelUp(){
      let leveled = false;
      while(player.xp >= player.xpToNext){
        player.xp -= player.xpToNext; player.level += 1; player.xpToNext = Math.floor(player.xpToNext * 1.35);
        player.maxHp += 18; player.attack += 4; player.defense += 2; player.maxMana += 8; player.aura += 1;
        player.hp = player.maxHp; player.mana = getEffectiveMaxMana(); leveled = true;
        addLog(`LEVEL UP! ${player.name} agora está no nível ${player.level}.`);
        addLog(`Você recebeu 1 aura. Total atual: ${player.aura}.`);
        addLog(`Você recebeu 2 pontos de atributo. Total disponível: ${player.attributes.points}.`);
      }
      if(leveled) alert(`Parabéns! ${player.name} subiu de nível, foi restaurado e recebeu aura(s).`);
    }


    function createBossLoot(mapName){
      const bossLootByMap = {
        Floresta: {name:"Raiz do Ent Supremo", slot:"armadura", element:"Terra", bonus:12 + player.level, statType:"defense", rarity:"Mítico"},
        Reino: {name:"Lâmina Carmesim Real", slot:"arma", element:"Fogo", bonus:12 + player.level, statType:"attack", rarity:"Mítico"},
        Lago: {name:"Coroa do Abismo", slot:"elmo", element:"Água", bonus:11 + player.level, statType:"defense", rarity:"Mítico"}
      };
      const item = bossLootByMap[mapName];
      return {
        ...item,
        sellValue:(item.bonus * 6),
        refineLevel:0,
        unique:true
      };
    }

    function tryDropItem(enemyData){
      let chance = 0.35; if(enemyData.rank==="Comandante") chance=0.50; if(enemyData.rank==="General") chance=0.70; if(enemyData.rank==="Boss") chance=1.00;
      if(Math.random() > chance) return null;
      const slot = EQUIPMENT_SLOTS[Math.floor(Math.random()*EQUIPMENT_SLOTS.length)];
      const rarityRoll = Math.random(); let rarity="Comum"; let bonus=2 + player.level;
      if(rarityRoll > 0.55){ rarity="Raro"; bonus += 2; } if(rarityRoll > 0.82){ rarity="Épico"; bonus += 4; } if(rarityRoll > 0.96){ rarity="Lendário"; bonus += 7; }
      const statType = slot === "arma" ? "attack" : "defense";
      const names = {
        arma:{Fogo:["Espada Flamejante","Arco de Brasas","Cajado Ígneo"], Água:["Lâmina das Marés","Arco da Correnteza","Cajado da Chuva"], Terra:["Machado Rochoso","Arco Raiz Profunda","Cajado de Pedra"]},
        elmo:{Fogo:["Elmo Vulcânico","Capuz em Brasa","Tiara Ígnea"], Água:["Elmo das Marés","Capuz da Névoa","Tiara da Chuva"], Terra:["Elmo Granítico","Capuz Musgoso","Tiara Rochosa"]},
        luvas:{Fogo:["Luvas de Cinza","Manoplas Ardentes","Garras de Brasas"], Água:["Luvas da Maré","Manoplas da Correnteza","Garras de Gelo Líquido"], Terra:["Luvas de Argila","Manoplas de Pedra","Garras de Raiz"]},
        armadura:{Fogo:["Armadura Vulcânica","Manto Rubro","Peitoral Incandescente"], Água:["Armadura das Marés","Manto da Névoa","Couraça Oceânica"], Terra:["Armadura do Vale","Manto Musgoso","Peitoral Granítico"]},
        calcas:{Fogo:["Calças de Magma","Grevas Rubras","Calças de Cinzas"], Água:["Calças Oceânicas","Grevas da Maré","Calças da Chuva"], Terra:["Calças Rochosas","Grevas do Vale","Calças de Musgo"]},
        sapatos:{Fogo:["Botas Vulcânicas","Botas Escarlates","Passos de Brasa"], Água:["Botas da Maré","Botas da Correnteza","Passos da Névoa"], Terra:["Botas de Pedra","Botas do Vale","Passos de Argila"]}
      };
      const name = names[slot][enemyData.element][Math.floor(Math.random() * names[slot][enemyData.element].length)];
      return {name, slot, element:enemyData.element, bonus, statType, rarity, sellValue: bonus * 4 + player.level * 2, refineLevel:0};
    }

    function craftItem(recipeId){
      const recipe = CRAFT_RECIPES.find(r => r.id===recipeId);
      if(!recipe) return;
      if(player.materials[recipe.material] < recipe.cost){
        addLog(`Materiais insuficientes para forjar ${recipe.name}.`);
        return render();
      }

      player.materials[recipe.material] -= recipe.cost;
      const valueBonus = recipe.bonus + Math.floor(player.level/2);
      const item = {
        name:recipe.name,
        slot:recipe.slot,
        element:recipe.element,
        bonus:valueBonus,
        statType:recipe.statType,
        rarity:recipe.rarity,
        sellValue:valueBonus * 5,
        refineLevel:0
      };

      const equippedItem = player.equipment[recipe.slot];
      if(equippedItem){
        player.inventory.push(equippedItem);
        addLog(`${equippedItem.name} foi removido do slot ${formatSlotName(recipe.slot)} e voltou ao inventário.`);
        player.equipment[recipe.slot] = item;
        ensureEconomy();
        player.economy.itemsCrafted += 1;
        addLog(`${player.name} forjou ${item.name} e equipou automaticamente no slot ${formatSlotName(recipe.slot)}.`);
      } else {
        player.inventory.push(item);
      updateQuest('craft');
        addLog(`${player.name} forjou ${item.name}.`);
      }

      saveGame();
      render();
    }

    function getRefineCost(item){
      return 2 + (item.refineLevel || 0);
    }

    function refineInventoryItem(index){
      const item = player.inventory[index];
      if(!item) return;
      const cost = getRefineCost(item);
      if(player.materials[item.element] < cost){
        addLog(`Materiais insuficientes para refinar ${item.name}.`);
        return render();
      }
      player.materials[item.element] -= cost;
      item.refineLevel = (item.refineLevel || 0) + 1;
      if(Math.random()<0.2){
        item.bonus = Math.max(1,item.bonus-1);
        addLog("Refino falhou! Item perdeu poder.");
      } else {
        item.bonus += 2;
      }
      item.sellValue += 8;
      ensureEconomy();
      player.economy.itemsRefined += 1;
      addLog(`${item.name} foi refinado para +${item.refineLevel}.`);
      saveGame(); render();
    }

    function mineResources(){
      const favored = MAPS[player.currentMap].favoredElement, node = getCurrentNode();
      let qty = 1 + Math.floor(Math.random()*2);
      if(node.type === "mineracao") qty += 2;
      player.materials[favored] += qty;
      const extra = ELEMENTS[Math.floor(Math.random()*ELEMENTS.length)];
      player.materials[extra] += 1;
      player.worldProgress[player.currentMap].mines += 1;
      updateQuest('mine');
      ensureEconomy();
      player.economy.miningYield += qty + 1;
      addLog(`${player.name} minerou em ${node.name} e obteve ${qty} material(is) de ${favored} e 1 de ${extra}.`);
      saveGame(); render();
    }

    function getInnCost(){ return 15 + (player.level * 5); }
    function stayAtInn(){
      const cost = getInnCost();
      if(player.gold < cost){ addLog("Ouro insuficiente para ficar na estalagem."); return render(); }
      player.gold -= cost; ensureEconomy(); player.economy.goldSpent += cost; player.hp = player.maxHp; player.mana = getEffectiveMaxMana();
      addLog(`${player.name} ficou na estalagem, recuperou HP e Mana completos e pagou ${cost} ouro.`);
      saveGame(); render();
    }

    function getCurrentNode(){ return MAP_NODES[player.currentMap].find(n => n.id===player.currentNode) || MAP_NODES[player.currentMap][0]; }
    function travelNode(nodeId){
      const node = MAP_NODES[player.currentMap].find(n => n.id===nodeId);
      if(!node) return;
      player.currentNode = nodeId;

      if(node.type === "combate"){
        addLog(`${player.name} chegou em ${node.name} e entrou em combate!`);
        saveGame();
        startBattle();
        return;
      }

      if(node.type === "evento"){
        player.eventChoice = createRandomEvent();
        addLog(`${player.name} encontrou um evento em ${node.name}.`);
        currentScreen = "event";
        saveGame();
        render();
        return;
      }

      if(node.type === "mineracao"){
        player.homeCraftStock.manaEssence += 1;
        addLog(`Ao chegar em ${node.name}, você encontrou 1 essência de mana.`);
      }

      addLog(`${player.name} se moveu para ${node.name}.`);
      saveGame();
      render();
    }

    function equipItem(index){
      const item = player.inventory[index]; if(!item) return;
      const slot = item.slot, old = player.equipment[slot];
      if(old){ player.inventory.push(old); addLog(`${old.name} voltou para o inventário.`); }
      player.equipment[slot] = item; player.inventory.splice(index,1);
      addLog(`${item.name} foi equipado em ${formatSlotName(slot)}.`);
      saveGame(); render();
    }
    function unequipItem(slot){
      const item = player.equipment[slot]; if(!item) return;
      player.inventory.push(item);
      updateQuest('craft'); player.equipment[slot]=null;
      addLog(`${item.name} foi desequipado e voltou ao inventário.`);
      saveGame(); render();
    }
    function sellItem(index){
      const item = player.inventory[index]; if(!item) return;
      player.gold += item.sellValue; ensureEconomy(); player.economy.goldEarned += item.sellValue; player.economy.itemsSold += 1; player.inventory.splice(index,1);
      addLog(`${item.name} foi vendido por ${item.sellValue} ouro.`);
      saveGame(); render();
    }
    function sellEquippedItem(slot){
      const item = player.equipment[slot]; if(!item) return;
      player.gold += item.sellValue; ensureEconomy(); player.economy.goldEarned += item.sellValue; player.economy.itemsSold += 1; player.equipment[slot]=null;
      addLog(`${item.name} estava equipado e foi vendido por ${item.sellValue} ouro.`);
      saveGame(); render();
    }

    function buyPotion(){
      if(player.gold < 20){ addLog("Ouro insuficiente para comprar poção de cura."); return render(); }
      player.gold -= 20; ensureEconomy(); player.economy.goldSpent += 20; player.potions += 1; player.healPotions.frasco += 1; addLog("Você comprou 1 frasco de cura."); saveGame(); render();
    }
    function buyManaPotion(){
      if(player.gold < 25){ addLog("Ouro insuficiente para comprar poção de mana."); return render(); }
      player.gold -= 25; ensureEconomy(); player.economy.goldSpent += 25; player.manaPotions += 1; player.manaPotionStock.frasco += 1; addLog("Você comprou 1 frasco de mana."); saveGame(); render();
    }
    function buyPotionTier(kind, id){
      const list = kind === "heal" ? POTION_SHOP.heal : POTION_SHOP.mana;
      const item = list.find(p => p.id === id);
      if(!item) return;
      if(player.gold < item.price){
        addLog("Ouro insuficiente para comprar esta poção.");
        return render();
      }
      player.gold -= item.price;
      ensureEconomy();
      player.economy.goldSpent += item.price;
      if(kind === "heal"){
        if(id.includes("frasco")){ player.healPotions.frasco += 1; player.potions += 1; }
        if(id.includes("calice")) player.healPotions.calice += 1;
        if(id.includes("garrafa")) player.healPotions.garrafa += 1;
      } else {
        if(id.includes("frasco")){ player.manaPotionStock.frasco += 1; player.manaPotions += 1; }
        if(id.includes("calice")) player.manaPotionStock.calice += 1;
        if(id.includes("garrafa")) player.manaPotionStock.garrafa += 1;
      }
      addLog(`Você comprou ${item.name}.`);
      saveGame();
      render();
    }
    function buySpell(spellId){
      const spell = SPELL_BOOK.find(s => s.id===spellId); if(!spell) return;
      if(player.learnedSpells.includes(spell.id)){ addLog(`Você já aprendeu ${spell.name}.`); return render(); }
      if(player.aura < spell.auraCost){ addLog(`Auras insuficientes para aprender ${spell.name}.`); return render(); }
      player.aura -= spell.auraCost; player.learnedSpells.push(spell.id);
      addLog(`${player.name} aprendeu a magia ${spell.name}.`);
      saveGame(); render();
    }

    function changeMap(mapName){
      if(!MAPS[mapName]) return;
      player.currentMap = mapName; player.currentNode = MAP_NODES[mapName][0].id;
      if(!player.worldProgress[mapName]) player.worldProgress[mapName] = {clears:0,bossUnlocked:false,bossDefeated:false,mines:0};
      addLog(`${player.name} viajou para ${mapName}.`);
      currentScreen = "world"; saveGame(); render();
    }

    function goTab(tab){ currentScreen = tab; saveGame(); render(); }
    function addLog(message){ battleLog.push(message); }

    function updateQuest(type, data={}){
      player.quests.forEach(q=>{
        if(q.claimed) return;
        if(type==="battle" && q.id==="q1") q.progress++;
        if(type==="mine" && q.id==="q2") q.progress++;
        if(type==="craft" && q.id==="q3") q.progress++;
        if(type==="battle" && q.type==="map" && q.map===data.map) q.progress++;
        if(type==="boss" && q.type==="boss" && q.map===data.map) q.progress = q.target;
        if(q.progress>=q.target) q.done = true;
      });
    }


    function hasSaveGame(){ return !!localStorage.getItem(SAVE_KEY); }
    function migrateSave(p){
      if(!p.version) p.version = 1;
      if(!p.attributes) p.attributes = {forca:0,resistencia:0,inteligencia:0,points:0};
      if(typeof p.attributes.points !== 'number') p.attributes.points = 0;
      if(!p.learnedSpells) p.learnedSpells = [];
      if(!p.healPotions) p.healPotions = {frasco:p.potions||0, calice:0, garrafa:0};
      if(!p.manaPotionStock) p.manaPotionStock = {frasco:p.manaPotions||0, calice:0, garrafa:0};
      if(!p.homeCraftStock) p.homeCraftStock = {healEssence:0,manaEssence:0};
      if(p.eventChoice === undefined) p.eventChoice = null;
      if(!p.quests) p.quests = [];
      if(!p.innUniqueQuests) p.innUniqueQuests = [];
      if(!p.economy) p.economy = {goldEarned:0,goldSpent:0,itemsSold:0,itemsCrafted:0,itemsRefined:0,battlesWon:0,battlesLost:0,miningYield:0};
      if(!p.worldProgress) p.worldProgress = {Floresta:{clears:0,bossUnlocked:false,bossDefeated:false,mines:0},Reino:{clears:0,bossUnlocked:false,bossDefeated:false,mines:0},Lago:{clears:0,bossUnlocked:false,bossDefeated:false,mines:0}};
      ['Floresta','Reino','Lago'].forEach(map=>{ if(!p.worldProgress[map]) p.worldProgress[map] = {clears:0,bossUnlocked:false,bossDefeated:false,mines:0}; });
      p.version = SAVE_VERSION;
      return p;
    }
    function saveGame(){
      if(!player) return;
      const payload = {player, enemy, battleActive, battleLog, currentScreen, selectedBattleRank};
      localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
    }
    function loadGame(){
      const raw = localStorage.getItem(SAVE_KEY); if(!raw) return false;
      try{
        const data = JSON.parse(raw);
        player = data.player || null; enemy = data.enemy || null; battleActive = !!data.battleActive;
        battleLog = Array.isArray(data.battleLog) ? data.battleLog : [];
        currentScreen = data.currentScreen || "casa"; selectedBattleRank = data.selectedBattleRank || "random";
        player = migrateSave(player);
        ensurePlayerState();
        return !!player;
      }catch(e){ console.error("Erro ao carregar save:", e); return false; }
    }
    function continueGame(){ if(loadGame()){ addLog("Progresso carregado com sucesso."); render(); } }
    function resetSave(){ localStorage.removeItem(SAVE_KEY); player=null; enemy=null; battleActive=false; battleLog=[]; currentScreen="base"; selectedBattleRank="random"; render(); }
    function manualSave(){ saveGame(); addLog("Progresso salvo com sucesso."); render(); }

    render();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
